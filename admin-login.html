<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: #111;
    padding: 2rem;
    border-radius: 12px;
    width: 300px;
    border: 1px solid #fbbf24;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: #222;
    border: none;
    color: white;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    background: #fbbf24;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

h2 {
    color: #fbbf24;
    text-align: center;
}
</style>

</head>
<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <p id="error"></p>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/admin-auth.js"></script>

</body>
</html>
