<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Orders</title>

<link rel="stylesheet" href="css/styles.css">

<style>
body {
    background: #000;
    color: white;
    font-family: Arial;
    padding: 2rem;
}

h1 {
    color: #fbbf24;
}

.order {
    background: #111;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border-radius: 12px;
    border: 1px solid rgba(251,191,36,0.2);
}

.order h3 {
    margin-bottom: 0.5rem;
    color: #fbbf24;
}

.items {
    margin-top: 1rem;
    padding-left: 1rem;
}

.item {
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
}

.badge {
    background: #fbbf24;
    color: black;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
}
</style>

</head>
<body>

<h1>🛒 Admin Dashboard - Orders</h1>

<div id="orders"></div>

<button onclick="logout()" class="add-cart-btn">

    Logout

</button>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- FIREBASE CONFIG -->

<script src="js/firebase.js"></script>

<!-- ADMIN SCRIPT -->

<script src="js/admin.js"></script>

</html>
